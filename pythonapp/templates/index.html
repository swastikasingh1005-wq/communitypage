<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicConnect | Citizen Action Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* Your custom image as background */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('https://share.google/Pqz5r72fDBZHsCr53'); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white;
            font-family: 'Poppins', sans-serif;
        }

        .glass-card {
            background: rgba(60, 166, 97, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(89, 73, 132, 0.2);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .header-section {
            padding: 60px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .btn-action {
            background: #ffcc00;
            color: #000;
            font-weight: bold;
            border-radius: 50px;
            padding: 10px 30px;
            border: none;
            transition: 0.3s;
        }

        .btn-action:hover {
            background: #fff;
            transform: scale(1.05);
        }

        .report-item {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            margin-bottom: 15px;
            padding: 15px;
            border-left: 5px solid #ffcc00;
        }

        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section text-center">
        <h1 class="display-3 fw-bold">🏛️ CivicConnect</h1>
        <p class="lead">Empowering Citizens for a Better Tomorrow</p>
    </div>

    <div class="row mb-5">
        <!-- Form Section -->
        <div class="col-md-5 mb-4">
            <div class="glass-card">
                <h3 class="mb-4 text-warning">Report an Issue</h3>
                <form action="/submit" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Issue Category</label>
                        <select name="category" class="form-select" required>
                            <option value="Water Shortage">Water Shortage</option>
                            <option value="Drainage/Sewage">Drainage/Sewage</option>
                            <option value="Road Construction">Road Construction</option>
                            <option value="Misbehaviour">Public Misbehaviour</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone Number (for SMS progress)</label>
                        <input type="text" name="phone" class="form-control" placeholder="+91 XXXX" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Location</label>
                        <input type="text" name="location" class="form-control" placeholder="Ward / Area" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Evidence (Photo/Video/Doc)</label>
                        <input type="file" name="evidence" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-action w-100">Submit to Nagar Nigam</button>
                </form>
            </div>
        </div>

        <!-- Progress List Section -->
        <div class="col-md-7">
            <div class="glass-card">
                <h3 class="mb-4 text-warning">Live Progress Feed</h3>
                {% for report in reports %}
                <div class="report-item">
                    <div class="d-flex justify-content-between align-items-center">
                        <h5 class="mb-1">{{ report.category }}</h5>
                        <span class="badge bg-warning text-dark">{{ report.status }}</span>
                    </div>
                    <p class="small mb-1">📍 {{ report.location }}</p>
                    <p class="small text-light">Progress will be sent to: {{ report.phone }}</p>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>

</body>
</html>
